<!doctype html>
<html>
  <head>
    <title>PayPal Test</title>
  </head>
  <body>
    <div id="paypal-button-container"></div>

    <script src="https://www.paypal.com/sdk/js?client-id=AfLVJRUUAehybaJ2Xy9dyBJNqWYOxGfHHf0ZMc2RtEdX2067Y1LA5X42Qwp_oxL7inGdEAr1E7uMTvxG&currency=USD"></script>
    <script>
      paypal
        .Buttons({
          createOrder: async () => {
            const res = await fetch(
              "https://api.hesteka.com/api/v1/donations/paypal/initiate",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  amount: 10,
                  donorEmail: "test@test.com",
                  donorName: "Test User",
                  type: "one-time",
                  currency: "usd",
                }),
              },
            );
            const data = await res.json();
            return data.data.orderId; // orderId return করো
          },

          onApprove: async (data) => {
            const res = await fetch(
              "https://api.hesteka.com/api/v1/donations/paypal/capture",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  orderId: data.orderID,
                }),
              },
            );
            const result = await res.json();
            console.log("Success:", result);
            alert("Payment Done! Check DB.");
          },

          onError: (err) => {
            console.error("PayPal Error:", err);
          },
        })
        .render("#paypal-button-container");
    </script>
  </body>
</html>
