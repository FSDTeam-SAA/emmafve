<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Stripe Donation</title>

  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 12px;
      width: 420px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    #card-element {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #8b3a3a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:disabled {
      background: #ccc;
    }

    #message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      display: none;
    }

    .success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .loading {
      background: #fff3cd;
      color: #856404;
      display: block;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>🐾 Donation</h2>

    <div class="field">
      <input id="donorName" placeholder="Name" />
    </div>

    <div class="field">
      <input id="donorEmail" placeholder="Email" />
    </div>

    <div class="field">
      <input id="amount" type="number" placeholder="Amount" />
    </div>

    <div class="field">
      <div id="card-element"></div>
    </div>

    <button id="pay-btn">Donate</button>

    <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
      <p style="font-size: 12px; color: #666;">Socket Auth (for notifications):</p>
      <div class="field">
        <input id="socketUserId" placeholder="User ID (e.g. 123)" value="test-user-123" />
      </div>
      <button id="connect-socket-btn" style="background: #4a4a4a; margin-bottom: 10px;">Connect Socket</button>
    </div>

    <div id="message"></div>
  </div>

  <script>
    const BACKEND_URL = "http://localhost:5000";

    const stripe = Stripe("pk_test_51ShzG65v6xjmDo05UhGMIsToDUCvN1B0ZrJlTjiYYNuwQ2xrc4ZnHAhPP3mbMQkGHo5gJqlrlQuobgQpSvLSbZOj00U9EPKZMw");

    const elements = stripe.elements();
    const card = elements.create("card");
    card.mount("#card-element");

    let socket;
    const connectSocketBtn = document.getElementById("connect-socket-btn");

    function connectSocket() {
      if (socket) socket.disconnect();

      const userId = document.getElementById("socketUserId").value;
      const email = document.getElementById("donorEmail").value;

      socket = io("http://localhost:5000", {
        transports: ["websocket"],
        query: { userId, email }
      });

      socket.on("connect", () => {
        console.log("Socket connected:", socket.id);
        show("loading", "Socket connected! Ready for notifications.");
        setTimeout(() => { if (msg.textContent.includes("Socket connected")) msg.style.display = 'none'; }, 3000);
      });

      socket.on("connect_error", (err) => {
        show("error", "Socket connection failed: " + err.message);
      });

      // 🔥 SOCKET LISTENER
      socket.on("payment:update", (data) => {
        console.log("Payment update received:", data);
        if (data.paymentIntentId !== currentPaymentId) return;

        clearTimeout(timeoutRef);

        if (data.status === "COMPLETED") {
          show("success", "✅ Payment successful!");
        } else {
          show("error", "❌ Payment failed!");
        }

        btn.disabled = false;
      });
    }

    connectSocketBtn.onclick = connectSocket;
    connectSocket(); // Initial connect

    const btn = document.getElementById("pay-btn");
    const msg = document.getElementById("message");

    let currentPaymentId = null;
    let timeoutRef = null;

    function show(type, text) {
      msg.style.display = "block";
      msg.className = type;
      msg.textContent = text;
    }

    btn.onclick = async () => {
      btn.disabled = true;
      show("loading", "Processing payment...");

      const donorName = document.getElementById("donorName").value;
      const donorEmail = document.getElementById("donorEmail").value;
      const amount = Number(document.getElementById("amount").value);

      try {
        // 1️⃣ INITIATE
        const res = await fetch(
          `${BACKEND_URL}/api/v1/donations/stripe/initiate`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              amount,
              currency: "eur",
              donorEmail,
              donorName,
              type: "one-time",
              isCompanyDonation: false,
            }),
          },
        );

        const data = await res.json();

        if (!res.ok) {
          show("error", data.message);
          btn.disabled = false;
          return;
        }

        const clientSecret = data.data.clientSecret;
        currentPaymentId = data.data.paymentIntentId;

        // ⏳ timeout fallback (webhook না এলে)
        timeoutRef = setTimeout(() => {
          show("error", "⚠️ No confirmation from server");
          btn.disabled = false;
        }, 15000);

        // 2️⃣ CONFIRM PAYMENT
        const { error } = await stripe.confirmCardPayment(clientSecret, {
          payment_method: {
            card,
            billing_details: {
              name: donorName,
              email: donorEmail,
            },
          },
        });

        if (error) {
          clearTimeout(timeoutRef);
          show("error", error.message);
          btn.disabled = false;
          return;
        }

        // 🔥 WAIT FOR WEBHOOK (NO SUCCESS HERE)
        show("loading", "Waiting for confirmation...");
      } catch (e) {
        show("error", "Something went wrong");
        btn.disabled = false;
      }
    };
  </script>
</body>

</html>
