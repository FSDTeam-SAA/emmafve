<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Socket Notification Tester</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1e1e1e;
      color: #a6e22e;
    }

    h2 {
      color: #fff;
    }

    #logs {
      background: #000;
      padding: 10px;
      min-height: 200px;
      border: 1px solid #333;
      margin-top: 20px;
      overflow-y: auto;
      max-height: 500px;
    }

    .log-item {
      margin-bottom: 15px;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .notification {
      color: #fd971f;
    }

    .status {
      color: #66d9ef;
      font-weight: bold;
    }

    input {
      padding: 5px;
      width: 300px;
    }

    button {
      padding: 5px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>Live Socket Notification Tester</h2>
  <div>
    <label>Target User ID (MongoDB Object ID):</label><br />
    <input type="text" id="userId" placeholder="69dbef... (Your logged in ID)">
    <button onclick="connectSocket()">Connect Dashboard</button>
  </div>

  <div id="logs">
    <div class="log-item">Ready. Please enter your MongoDB User ID and hit Connect...</div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    let socket;

    function addLog(text, className = "status") {
      const logs = document.getElementById("logs");
      const element = document.createElement("div");
      element.className = `log-item ${className}`;
      element.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
      logs.prepend(element);
    }

    function connectSocket() {
      const userId = document.getElementById("userId").value.trim();
      if (!userId) return addLog("Please enter a valid User ID first!", "notification");

      // Disconnect previous if multiple clicks
      if (socket) socket.disconnect();

      addLog(`Attempting to connect to backend for User ID: ${userId}...`);

      // Connect explicitly forcing polling to bypass simple CORS blockages if any in raw HTML,
      // and pass the userId securely in the handshake query exactly how your backend expects it.
      socket = io("http://localhost:5000", {
        query: { userId },
        transports: ['websocket', 'polling']
      });

      // Event: On Successful Connection
      socket.on("connect", () => {
        addLog(`✅ Connected Successfully to Socket Server! (Socket ID: ${socket.id})`);
        addLog(`Listening silently for "notification:new" events...`);
      });

      socket.on("disconnect", () => {
        addLog(` Disconnected from Server.`);
      });

      socket.on("connect_error", (error) => {
        addLog(`⚠️ Connection Error: ${error.message}`);
      });

      // Event: CORE NOTIFICATION CATCHER
      socket.on("notification:new", (data) => {
        addLog(`🔔 NEW NOTIFICATION RECEIVED!`, 'notification');
        addLog(`Payload Data: \n${JSON.stringify(data, null, 2)}`, 'notification');
      });
    }
  </script>
</body>

</html>
